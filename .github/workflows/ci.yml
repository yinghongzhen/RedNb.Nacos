name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - "src/**"
      - "tests/**"
      - "samples/**"
      - ".github/workflows/**"
      - "Directory.Packages.props"
      - "Directory.Build.props"
      - "RedNb.Nacos.slnx"
      - ".editorconfig"
      - "dotnet-tools.json"
  pull_request:
    branches: [main, develop]
    paths:
      - "src/**"
      - "tests/**"
      - "samples/**"
      - ".github/workflows/**"
      - "Directory.Packages.props"
      - "Directory.Build.props"
      - "RedNb.Nacos.slnx"
      - ".editorconfig"
      - "dotnet-tools.json"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  build-and-format:
    name: Build And Format
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/Directory.Build.props', '**/*.csproj', 'RedNb.Nacos.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore RedNb.Nacos.slnx

      - name: Verify format
        run: dotnet format RedNb.Nacos.slnx --verify-no-changes --verbosity minimal

      - name: Build
        run: dotnet build RedNb.Nacos.slnx --no-restore --configuration Release

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build-and-format
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: core
            project: tests/RedNb.Nacos.Tests/RedNb.Nacos.Tests.csproj
            result_file: unit-core.trx
          - name: http
            project: tests/RedNb.Nacos.Http.Tests/RedNb.Nacos.Http.Tests.csproj
            result_file: unit-http.trx
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/Directory.Build.props', '**/*.csproj', 'RedNb.Nacos.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore RedNb.Nacos.slnx

      - name: Run unit tests
        run: |
          dotnet test \
            ${{ matrix.project }} \
            --no-restore \
            --configuration Release \
            --logger "trx;LogFileName=${{ matrix.result_file }}" \
            --results-directory TestResults

      - name: Upload unit test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: unit-test-results-${{ matrix.name }}
          path: TestResults/
          retention-days: 7

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-format
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/Directory.Build.props', '**/*.csproj', 'RedNb.Nacos.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore RedNb.Nacos.slnx

      - name: Start Nacos
        run: |
          docker run -d --name nacos \
            -e MODE=standalone \
            -p 8848:8848 \
            -p 9848:9848 \
            nacos/nacos-server:v3.1.1

      - name: Wait for Nacos ready
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8848/nacos/ > /dev/null; then
              echo "Nacos is ready."
              exit 0
            fi
            sleep 2
          done
          echo "Nacos did not become ready in time."
          docker logs nacos || true
          exit 1

      - name: Run integration tests
        run: |
          dotnet test \
            tests/RedNb.Nacos.IntegrationTests/RedNb.Nacos.IntegrationTests.csproj \
            --no-restore \
            --configuration Release \
            --logger "trx;LogFileName=integration-tests.trx" \
            --results-directory TestResults

      - name: Dump Nacos logs on failure
        if: failure()
        run: docker logs nacos > nacos.log

      - name: Stop Nacos
        if: always()
        run: docker rm -f nacos || true

      - name: Upload Nacos logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: nacos-logs
          path: nacos.log
          retention-days: 7

      - name: Upload integration test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: integration-test-results
          path: TestResults/
          retention-days: 7
